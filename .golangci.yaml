---
version: "2"

linters:
  enable:
    - bodyclose
    - dupl
    - errorlint
    - funlen
    - goconst
    - gosec
    - misspell
    - prealloc
    - unconvert
  settings:
    funlen:
      lines: 80
    staticcheck:
      checks:
        - all
        - -SA1019
  exclusions:
    rules:
      - linters:
          - dupl
          - funlen
        path: _test.go
      - linters:
          - staticcheck
        text: "SA1019"
